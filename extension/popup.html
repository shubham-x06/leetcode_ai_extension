<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #0D0D1A;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #F1F1EE;
      border-radius: 16px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
      padding: 20px 20px 16px;
      position: relative;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 18px; height: 18px; }
    .title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .subtitle { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 0.04em; text-transform: uppercase; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .status-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.logged-in { background: #10B981; box-shadow: 0 0 8px #10B981; }
    .status-dot.logged-out { background: #EF4444; box-shadow: 0 0 8px #EF4444; }
    .status-dot.loading { background: #F59E0B; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .status-text { font-size: 13px; }
    .status-name { font-weight: 600; color: #F1F1EE; }
    .status-sub { font-size: 11px; color: #6B7280; margin-top: 1px; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.01em;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: white;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.5); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: #111827;
      color: #9CA3AF;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-secondary:hover { background: #1F2937; color: #F1F1EE; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .footer {
      padding: 10px 16px 14px;
      display: flex;
      justify-content: center;
    }
    .footer p {
      font-size: 11px;
      color: #374151;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <div>
        <div class="title">LeetAI</div>
        <div class="subtitle">AI Companion</div>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- Auth Status -->
    <div class="status-card" id="status-card">
      <div class="status-dot loading" id="status-dot"></div>
      <div class="status-text">
        <div class="status-name" id="status-name">Checking...</div>
        <div class="status-sub" id="status-sub">Loading session</div>
      </div>
    </div>

    <!-- Open Dashboard -->
    <button class="btn btn-primary" id="open-dashboard-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Open Dashboard
    </button>

    <div class="divider"></div>

    <!-- Logout (only when logged in) -->
    <button class="btn btn-secondary hidden" id="logout-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>

  <div class="footer">
    <p>LeetCode AI · v1.0.0</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
